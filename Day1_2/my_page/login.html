<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>로그인 페이지</title>
        <link rel="stylesheet" href="./css/auth.css">
        <link rel="stylesheet" href="./css/common.css">
    </head>
    
    <body>
        <main>
            <!--아이디와 비번을 필드에 맞게 작성하면 index.html로 이동-->
            <form action="index.html" method="get">

                <!--로그인 창 입력 필드셋 -> 투명한 유리 디자인으로 함-->
                <fieldset>

                    <legend>LOG IN HERE</legend>
                    
                    <!--로그인 아이디 입력 창-->
                    <p>
                        <div class="login-form-group">
                            <label class="id ePlaceholder" title="ID">
                            <input type="text" class="common-btn login-id" id="user-id" name="user-id" minlength="4" 
                            maxlength="15" placeholder="ID" required>
                        </div>
                    </p>

                    <!--로그인 비번 입력 창-->
                    <p>
                        <div class="login-form-group">
                            <label class="password ePlaceholder" title="Password">
                            <input type="password" class="common-btn login-pw" id="user-pw" name="user-pw" minlength="8" 
                            placeholder="Password" required>
                        </div>
                    </p>


                    <!--아이디 저장하기 체크 박스-->
                    <div class="save-id">
                        <span class="form-check">
                            <input type="checkbox" id="save-check">
                            <label for="save-check" class="check-btn">아이디 저장하기
                        </span>
                    </div>
                    
                    <!--로그인 하기 버튼-->
                    <div class="login-action">
                        <div class="form-btn">
                            <button type="submit" class="btn-submit align-center" id="login-submit">
                                Login
                            </button>
                        </div>
                    </div>

                    <!--회원가입 하기 링크-->
                    <div class="account-menu">
                        <a href="signup.html" id="signup">
                        <span class="account-menu">Create Account</span>
                    </a>

                    </div>

                    

                </fieldset>


            </form>
        </main>
    </body>
</html>
