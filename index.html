<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Where Food - 날씨 기반 음식 추천</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/static/css/main.css">
    <!-- 카카오 JavaScript 키 -->
    <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=e18d3ee9cbbf978c2e37e5fc08de3b81&libraries=services"></script>
    
</head>
<body>

    <div class="hero-section">
        <div class="container">
            <h1 class="display-4">오늘 뭐 먹지?</h1>
            <p class="lead">현재 날씨와 위치에 딱 맞는 음식을 추천해드려요!</p>
            <div class="row justify-content-center mt-4">
                <div class="col-md-6">
                    <div class="input-group">
                        <img src="https://storage.googleapis.com/tagjs-prod.appspot.com/v1/dVvoNoBrKq/vvsc0qnm_expires_30_days.png" class="location-icon"/>
                        <input type="text" id="location-search-input" class="form-control" placeholder="search location " onkeydown="if(event.key === 'Enter') searchLocation()">
                        <button class="btn btn-light" type="button" id="location-search-btn" onclick="searchLocation()">
                            <i class="bi bi-search"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="container">
        <!-- 날씨 정보 표시 영역 -->
        <div class="row justify-content-center mb-5">
            
            <div class="col-lg-10">

                <div class="weather-wrapper">
                    <img src="https://storage.googleapis.com/tagjs-prod.appspot.com/v1/dVvoNoBrKq/7gssixfe_expires_30_days.png" class="weather-box-icon"/>

                    <div class="weather-card d-flex justify-content-center align-items-center">

                        <div id="weather-info" class="weather-content" style="display: none;">

                            <!-- 위치 -->
                            <h2 id="location-name" class="section-title">
                                <i class="bi bi-geo-alt-fill"></i>
                            </h2>

                            <div class="weather-main">
                                <!-- 왼쪽 날씨 아이콘 -->
                                <div class="weather-left">
                                    <i id="weather-icon" class="bi weather-icon"></i>
                                    <p id="weather-description" class="weather-description"></p>
                                </div>

                                <!-- 가운데 온도 -->
                                <div class="weather-center">
                                    <p id="temperature" class="temperature"></p>
                                </div>

                                <!-- 오른쪽 상세 정보 -->
                                <div class="weather-right">
                                    <div class="weather-detail-row">
                                        <i class="bi bi-wind"></i>
                                        <span class="detail-label">Wind</span>
                                        <span id="wind-speed" class="detail-value"></span>
                                    </div>

                                    <div class="weather-detail-row">
                                        <i class="bi bi-droplet"></i>
                                        <span class="detail-label">Hum</span>
                                        <span id="humidity" class="detail-value"></span>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div id="loading" class="text-center">
                            <div class="spinner-border text-primary" role="status">
                                <span class="visually-hidden">Loading...</span>
                            </div>
                            <p class="mt-2">위치 정보를 가져오는 중입니다...</p>
                        </div>

                    </div>
                </div>
            </div>
        </div>

        <!-- 음식 추천 결과 -->
       <div id="recommendation-section" style="display: none;">
            <h2 class="text-center section-title">오늘의 추천 메뉴 😋</h2> 
            <div style="text-align: center;">
            <a href="#=" class="toggleLink" id="toggleLink" style="color: black; text-decoration: none;">분석 히트맵 조회 ▼</a>
            </div>
            <div id="toggleContent" style="display: none; text-align: center;">
                <span id="resultImage">분석 히트맵 조회 내용입니다.</span>
            </div>
           
            <p class="text-center text-muted mb-4">마음에 드는 음식을 클릭하여 주변 맛집을 찾아보세요!</p>
            <div id="foodCarousel" class="carousel slide">
                <div class="carousel-inner" id="recommendation-carousel-inner">
                    <!-- 여기에 음식 리스트 나옴 -->
                </div>
                <button class="carousel-control-prev" type="button" data-bs-target="#foodCarousel" data-bs-slide="prev">
                    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                    <span class="visually-hidden">Previous</span>
                </button>
                <button class="carousel-control-next" type="button" data-bs-target="#foodCarousel" data-bs-slide="next">
                    <span class="carousel-control-next-icon" aria-hidden="true"></span>
                    <span class="visually-hidden">Next</span>
                </button>
            </div>
        </div>
        
        <!-- 지도와 맛집 리스트 -->
        <div id="map-and-list-section" class="mt-5" style="display: none;">
            <div class="row">
                <div class="col-lg-8">
                    <h2 id="map-title" class="section-title">주변 지도 🗺️</h2>
                    <div id="map"></div>
                </div>
                <div class="col-lg-4">
                    <!-- 맛집 리스트 제목과 정렬 버튼 -->
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <h2 class="section-title mb-0">맛집 리스트</h2>
                        <!-- 정렬 버튼 그룹 -->
                        <div id="sort-buttons" class="btn-group btn-group-sm" role="group" style="display: none;">
                            <button type="button" class="btn btn-outline-primary active" onclick="resortPlaces('accuracy')">정확도순</button>
                            <button type="button" class="btn btn-outline-primary" onclick="resortPlaces('distance')">거리순</button>
                            <button type="button" class="btn btn-outline-primary" onclick="resortPlaces('rating')">평점순</button>
                        </div>
                    </div>
                    <!-- 맛집 목록이 표시될 곳 -->
                    <div id="search-results-list">
                        <p class="text-muted">추천 메뉴를 클릭하면 여기에 맛집 목록이 나타납니다.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <footer class="text-center text-muted py-4 mt-5">
        <p>© 2025 날씨와 지역정보를 이용한 지능형 음식 추천 웹 서비스</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="/static/js/state.js"></script>
    <script src="/static/js/map.js"></script>
    <script src="/static/js/weather.js"></script>
    <script src="/static/js/restaurant.js"></script>
    <script src="/static/js/recommend.js"></script>
    <script src="/static/js/app.js"></script>

</body>
</html>
